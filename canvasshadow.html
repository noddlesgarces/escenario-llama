<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canvas</title>
    <style>
        * {
            margin:0;
            padding:0;
            font-family: sans-serif;
        }
        body {
            background-color: whitesmoke;
            overflow: hidden;
        }
        #canvas {
            display: block;
 /*         width: 100%;
            height: 100%;*/
        }

    </style>
</head>
<body>
    <canvas id="canvas"></canvas>


    <script>

        // shadow atributes
        // - shadowColor
        // - shadowOffsetX
        // - shadowOffsetY
        // - shadowBlur


        const colorRed = 'rgba(255, 26, 104, 1)';

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        ctx.beginPath();
        ctx.strokeStyle = colorRed;
        ctx.lineWidth = 30;
        ctx.shadowColor = 'green';
        ctx.shadowOffsetX = 10;
        ctx.shadowOffsetY = 10;
        ctx.shadowBlur = 5;
        ctx.moveTo(100, 100);
        ctx.lineTo(200, 100);
        ctx.stroke();

        ctx.beginPath();
        ctx.strokeStyle = colorRed;
        ctx.lineWidth = 30;
        ctx.shadowColor = 'blue';
        ctx.shadowOffsetX = 10;
        ctx.shadowOffsetY = -10;
        ctx.shadowBlur = 50;
        ctx.moveTo(100, 200);
        ctx.lineTo(200, 200);
        ctx.stroke();

        ctx.beginPath();
        ctx.strokeStyle = colorRed;
        ctx.lineWidth = 30;
        ctx.shadowColor = 'black';
        ctx.shadowOffsetX = -10;
        ctx.shadowOffsetY = 10;
        ctx.shadowBlur = 15;
        ctx.moveTo(100, 300);
        ctx.lineTo(200, 300);
        ctx.stroke();

        ctx.beginPath();
        ctx.strokeStyle = colorRed;
        ctx.lineWidth = 30;
        ctx.shadowColor = 'black';
        ctx.shadowOffsetX = -10;
        ctx.shadowOffsetY = -10;
        ctx.shadowBlur = 20;
        ctx.moveTo(100, 400);
        ctx.lineTo(200, 400);
        ctx.stroke();


    </script>




</body>
</html>
