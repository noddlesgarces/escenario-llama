<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canvas</title>
    <style>
        * {
            margin:0;
            padding:0;
            font-family: sans-serif;
        }
        body {
            background-color: black;
            overflow: hidden;
        }
        #canvas {
            display: block;
 /*         width: 100%;
            height: 100%;*/
        }

    </style>
</head>
<body>
    <canvas id="canvas"></canvas>


    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');


        // butt -> default
        // round == border radius style
        // square == add square

        // linejoin
        // miter => angulo de 90 grados default
        // bevel => aplana el angulo
        // round =>  redondea el estilo del border radius del algulo



        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        
        ctx.beginPath(); // reinicia el estado de la linea o forma
        ctx.strokeStyle = 'rgba(255, 26, 104, 1)';
        ctx.lineCap = 'butt';
        ctx.lineJoin = 'mitter';
        ctx.lineWidth = 30
        ctx.moveTo(100, 100); // x horizontal y vertical en cantidad de pixeles
        ctx.lineTo(250, 100);
        ctx.stroke();

        ctx.beginPath(); // reinicia el estado de la linea o forma
        ctx.strokeStyle = 'rgba(255, 26, 104, 1)';
        ctx.lineCap = 'butt';
        ctx.lineJoin = 'mitter';
        ctx.lineWidth = 30
        ctx.moveTo(250, 100); // x horizontal y vertical en cantidad de pixeles
        ctx.lineTo(250, 130);
        ctx.stroke();

        ctx.beginPath(); // reinicia el estado de la linea o forma
        ctx.strokeStyle = 'rgba(54, 162, 235, 1)';
        ctx.lineCap = 'round';
        ctx.lineJoin = 'bevel';
        ctx.lineWidth = 30
        ctx.moveTo(100, 200); // x horizontal y vertical en cantidad de pixeles
        ctx.lineTo(250, 200);
        ctx.lineTo(250, 230);
        ctx.stroke();

        ctx.beginPath(); // reinicia el estado de la linea o forma
        ctx.strokeStyle = 'rgba(75, 192, 192, 1)';
        ctx.lineCap = 'square';
        ctx.lineJoin = 'round';
        ctx.lineWidth = 30
        ctx.moveTo(100, 300); // x horizontal y vertical en cantidad de pixeles
        ctx.lineTo(250, 300);
        ctx.lineTo(250, 330);
        ctx.stroke();


    </script>




</body>
</html>
