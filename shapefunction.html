<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin:0;
            padding:0;
            font-family: sans-serif;
        }
        body {
            background-color: black;
            overflow: hidden;
        }
        #canvas {
            display: block;
 /*         width: 100%;
            height: 100%;*/
        }

    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <script>
        const colorRed = 'rgba(255, 26, 104, 1)'
        const colorBlue = 'rgba(54, 162, 235, 1)'
        const colorYellow = 'rgba(255, 206, 86, 1)'
        const colorGreen = 'rgba(75, 192, 192, 1)'
        const colorPurple = 'rgba(153, 102, 255, 1)'

        const canvas = document.getElementById('canvas');
        const ctx =  canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const radius = 5;
        const angle = Math.PI / 180;

        const startX= 100;
        const startY= 300;
        const endX= 400;
        const endY= 300;
        const controlX1= 300;
        const controlY1= 500;
        const controlX2= 500;
        const controlY2= 200;
                
        function drawCircle(x, y, width, color){
            ctx.beginPath();
            ctx.strokeStyle = color;
            ctx.lineWidth = width;
            ctx.arc(x, y, radius, angle * 0, angle * 360, false)
            ctx.stroke();
        };


        drawCircle(startX, startY, 10, colorRed); // SP
        drawCircle(endX, endY, 10, colorRed); // EP
        drawCircle(controlX1, controlY1, 10, colorBlue); // CP1
        drawCircle(controlX2, controlY2, 10, colorBlue); // CP2


        function drawBezierCurveShape(startX, startY, controlX1, controlY1, controlX2, controlY2, endX, endY) {

        
            ctx.beginPath();
            ctx.strokeStyle = colorYellow;
            ctx.lineWidth = 5;
            ctx.moveTo(startX, startY);
            ctx.bezierCurveTo(controlX1, controlY1, controlX2, controlY2, endX, endY);
            ctx.stroke();

            ctx.beginPath();
            ctx.strokeStyle = colorPurple;
            ctx.lineWidth = 5;
            ctx.moveTo(startX, startY); // SP
            ctx.lineTo(controlX1, controlY1); // CP1
            ctx.lineTo(controlX2, controlY2); // CP2
            ctx.lineTo(endX, endY); // EP
            ctx.stroke();

            
        }
        
    drawBezierCurveShape(startX, startY, controlX1, controlY1, controlX2, controlY2, endX, endY);

    </script>   
</body>
</html>
