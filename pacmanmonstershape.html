<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
        }

        body {
            background-color: black;
            overflow: hidden;
        }

        #canvas {
            display: block;
            /*         width: 100%;
            height: 100%;*/
        }
    </style>
</head>

<body>
    <canvas id="canvas"></canvas>
    <script>
        const colorRed = 'rgba(255, 26, 104, 1)'
        const colorBlue = 'rgba(54, 162, 235, 1)'
        const colorYellow = 'rgba(255, 206, 86, 1)'
        const colorGreen = 'rgba(75, 192, 192, 1)'
        const colorPurple = 'rgba(153, 102, 255, 1)'

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        ctx.beginPath();
        ctx.strokeStyle = colorBlue;
        ctx.lineWidth = 3;
        ctx.moveTo(300, 200);
        ctx.lineTo(400, 200);
        ctx.stroke();

        const radius = 50;
        const angle = Math.PI / 180;

        ctx.beginPath();
        ctx.fillStyle = colorBlue;
        ctx.lineWidth = 3;       
        ctx.arc(350, 200, radius, angle * 180, angle * 0, false);
        ctx.lineTo(400, 280);
        ctx.lineTo(390, 260);
        ctx.lineTo(380, 280);
        ctx.lineTo(370, 260);
        ctx.lineTo(360, 280);
        ctx.lineTo(350, 260);
        ctx.lineTo(340, 280);
        ctx.lineTo(330, 260);
        ctx.lineTo(320, 280);
        ctx.lineTo(310, 260);
        ctx.lineTo(300, 280);
        ctx.closePath()

        ctx.fill();

    </script>
</body>

</html>
