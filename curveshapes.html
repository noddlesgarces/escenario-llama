<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
        }

        body {
            background-color: black;
            overflow: hidden;
        }

        #canvas {
            display: block;
            /*         width: 100%;
            height: 100%;*/
        }
    </style>
</head>

<body>
    <canvas id="canvas"></canvas>
    <script>
        const colorRed = 'rgba(255, 26, 104, 1)'
        const colorBlue = 'rgba(54, 162, 235, 1)'
        const colorYellow = 'rgba(255, 206, 86, 1)'
        const colorGreen = 'rgba(75, 192, 192, 1)'
        const colorPurple = 'rgba(153, 102, 255, 1)'

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        ctx.beginPath();
        ctx.strokeStyle = colorRed;
        ctx.lineWidth = 10;
        ctx.moveTo(400, 250);
        ctx.lineTo(400, 300);
        ctx.stroke();

        ctx.beginPath();
        ctx.strokeStyle = colorRed;
        ctx.lineWidth = 10;

        // Lado izquierdo 
        ctx.moveTo(400, 300);
        ctx.lineTo(370, 330);
        ctx.bezierCurveTo(350, 355, 390, 380, 370, 400);
        ctx.lineTo(430, 400); // línea inferior

        // Lado derecho (espejo: 400 + (400 - x))
        ctx.bezierCurveTo(410, 380, 450, 355, 430, 330);
        ctx.lineTo(400, 300); // vuelve al punto inicial

        ctx.closePath();
        ctx.stroke();

        // ctx.beginPath();
        // ctx.strokeStyle = colorRed;
        // ctx.lineWidth = 10;
        // ctx.moveTo(400, 300);
        // ctx.lineTo(380, 300);
        // ctx.lineTo(400, 330);
        // ctx.lineTo(420, 300);
        // ctx.closePath();
        // ctx.stroke();




    </script>
</body>

</html>
