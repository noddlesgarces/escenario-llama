<body>
    <canvas id="canvas"></canvas>
    <script>
        const colorRed = 'rgba(255, 26, 104, 1)'
        const colorBlue = 'rgba(54, 162, 235, 1)'
        const colorYellow = 'rgba(255, 206, 86, 1)'
        const colorGreen = 'rgba(75, 192, 192, 1)'
        const colorPurple = 'rgba(153, 102, 255, 1)'

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const radius = 100;
        const radius2 = 90;
        const angle = Math.PI / 180;


        ctx.strokeStyle = colorBlue;
        ctx.lineWidth = 5;
        ctx.strokeRect(100, 100, 100, 100);

        ctx.fillStyle = colorRed;
        ctx.fillRect(250, 100, 100, 100);

        ctx.strokeStyle = colorBlue;
        ctx.lineWidth = 5;
        ctx.fillStyle = colorRed;
        ctx.strokeRect(400, 100, 100, 100);
        ctx.fillRect(400, 100, 100, 100);

        ctx.clearRect(425, 125, 50, 50);


    </script>
