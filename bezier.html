<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin:0;
            padding:0;
            font-family: sans-serif;
        }
        body {
            background-color: black;
            overflow: hidden;
        }
        #canvas {
            display: block;
 /*         width: 100%;
            height: 100%;*/
        }

    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <script>
        const colorRed = 'rgba(255, 26, 104, 1)'
        const colorBlue = 'rgba(54, 162, 235, 1)'
        const colorYellow = 'rgba(255, 206, 86, 1)'
        const colorGreen = 'rgba(75, 192, 192, 1)'
        const colorPurple = 'rgba(153, 102, 255, 1)'

        const canvas = document.getElementById('canvas');
        const ctx =  canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const radius = 5;
        const angle = Math.PI / 180;
        
        // STARTING POINT = SP
        ctx.beginPath();
        ctx.strokeStyle = colorRed;
        ctx.lineWidth = 10;
        ctx.arc(200, 300, radius, angle * 0, angle * 360, false)
        ctx.stroke();

        // ENDING POINT = EP
        ctx.beginPath();
        ctx.strokeStyle = colorRed;
        ctx.lineWidth = 10;
        ctx.arc(700, 300, radius, angle * 0, angle * 360, false)
        ctx.stroke();

        // CONTROL POINT 1 = CP1
        ctx.beginPath();
        ctx.strokeStyle = colorBlue;
        ctx.lineWidth = 10;
        ctx.arc(300, 100, radius, angle * 0, angle * 360, false)
        ctx.stroke();
       
        // CONTROL POINT 2 = CP2
        ctx.beginPath();
        ctx.strokeStyle = colorBlue;
        ctx.lineWidth = 10;
        ctx.arc(500, 650, radius, angle * 0, angle * 360, false)
        ctx.stroke();

        // bezierCurveTo(controlX1, controlY1, controlX2, controlY2, endX, endY);
        
        ctx.beginPath();
        ctx.strokeStyle = colorYellow;
        ctx.lineWidth = 5;
        ctx.moveTo(200, 300);
        ctx.bezierCurveTo(300, 100, 500, 650, 700, 300);
        ctx.stroke();

        ctx.beginPath();
        ctx.strokeStyle = colorPurple;
        ctx.lineWidth = 5;
        ctx.moveTo(200, 300);
        ctx.lineTo(300, 100);
        ctx.lineTo(500, 650);
        ctx.lineTo(700, 300);
        ctx.stroke();

        ctx.beginPath();
        ctx.strokeStyle = 'lightgrey';
        ctx.lineWidth = 5;
        ctx.moveTo(300, 100);
        ctx.lineTo(250, 300); // 300 - 200 = 100 / 2 = 50 + 200 = 250
        ctx.stroke();

        ctx.beginPath();
        ctx.strokeStyle = 'lightgrey';
        ctx.lineWidth = 5;
        ctx.moveTo(500, 650);
        ctx.lineTo(600, 300); // 700 - 500 = 200 / 2 = 100 + 500 = 600
        ctx.stroke();

        

    </script>   
</body>
</html>
